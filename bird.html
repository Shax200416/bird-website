<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bird</title>
	<link rel="stylesheet" href="css/style.css">
</head>

<body>

	<header class="navbar">
		<div class="nav-left">

			</div>
			<h2 class="site-title2">Bird</h2>

		<div class="nav-right">

						<img src="img/flagskg.png" alt="KG"> KG

			</div>
		</div>

	<main id="birdDetail" class="bird-detail-wrapper">

	<script src="js/data.js"></script>
